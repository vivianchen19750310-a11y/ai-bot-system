name: AI Bot Auto Run

on:
  schedule:
    - cron: '*/10 * * * *'  # 每10分鐘跑一次
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 下載程式
        uses: actions/checkout@v3

      - name: 安裝 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 執行 bot
        run: python bot.py
